<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsGeek</title>
    <link rel="icon" type="image/png" href="public/ico.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar bg-light shadow-lg d-flex p-3 justify-content-between">
        <div class="container-fluid">
            <div>
                <a class="navbar-brand font-weight-bold justify-content-between fs-2" href="#">News<span class="text-purple">Geek</span>!</a>
            </div>
            <!-- Botão de alternância para o menu hambúrguer -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Menu de navegação que será escondido em telas pequenas -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item mx-2">
                        <a class="nav-link font-weight-bold btn btn-purple" href="#">Home</a>
                    </li>
                    <li class="nav-item mx-2">
                        <a class="nav-link font-weight-bold btn btn-outline-purple" href="#">Anime</a>
                    </li>
                    <li class="nav-item mx-2">
                        <a class="nav-link font-weight-bold btn btn-outline-purple" href="#">Manga</a>
                    </li>
                    <li class="nav-item mx-2">
                        <a class="nav-link font-weight-bold btn btn-outline-purple" href="#">Novels</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Carousel -->
    <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="public/sakura.jpg" class="d-block w-100" alt="Imagem 1">
                <div class="carousel-caption d-none d-md-block">
                    <h5>Título da Imagem 1</h5>
                    <p>Descrição da imagem 1.</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="public/madoka.jpg" class="d-block w-100 " alt="Imagem 2">
                <div class="carousel-caption d-none d-md-block">
                    <h5>Título da Imagem 2</h5>
                    <p>Descrição da imagem 2.</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="public/moon.webp" class="d-block w-100" alt="Imagem 3">
                <div class="carousel-caption d-none d-md-block">
                    <h5>Título da Imagem 3</h5>
                    <p>Descrição da imagem 3.</p>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Script do Bootstrap para funcionalidade do menu hambúrguer e carousel -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
